<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GroundWork — Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..700;1,7..72,300..700&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Nunito Sans", sans-serif;
        background: #f5f5f2;
        color: #1a1a18;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
      }

      /* ── Login ── */
      .login-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
      }
      .login-card {
        background: #fff;
        border: 1px solid #e4e4df;
        border-radius: 14px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .login-card h1 {
        font-family: "Literata", serif;
        font-size: 1.4rem;
        font-weight: 600;
        color: #1e4d35;
        margin-bottom: 0.4rem;
      }
      .login-card p {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 1.5rem;
      }
      .login-input {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        margin-bottom: 0.75rem;
        outline: none;
        transition: border-color 0.15s;
      }
      .login-input:focus { border-color: #3a7d55; }
      .login-btn {
        width: 100%;
        padding: 0.65rem;
        background: #1e4d35;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .login-btn:hover { background: #2a6347; }
      .login-error {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: #dc2626;
      }

      /* ── Dashboard ── */
      .page-header {
        max-width: 900px;
        margin: 0 auto 2.5rem;
        display: flex;
        align-items: baseline;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .page-header h1 {
        font-family: "Literata", serif;
        font-size: 1.75rem;
        font-weight: 600;
        color: #1e4d35;
      }
      .page-header a {
        font-size: 0.85rem;
        color: #3a7d55;
        text-decoration: none;
      }
      .page-header a:hover { text-decoration: underline; }
      .header-actions { margin-left: auto; display: flex; gap: 0.5rem; }
      .btn-sm {
        padding: 0.4rem 1rem;
        border: none;
        border-radius: 6px;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
      }
      .btn-primary { background: #1e4d35; color: #fff; }
      .btn-primary:hover { background: #2a6347; }
      .btn-ghost { background: transparent; color: #6b7280; border: 1px solid #d1d5db; }
      .btn-ghost:hover { background: #f3f3f0; }

      .grid {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        border: 1px solid #e4e4df;
      }
      .stat-card .label {
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #6b7280;
        margin-bottom: 0.35rem;
      }
      .stat-card .value {
        font-family: "Literata", serif;
        font-size: 2.2rem;
        font-weight: 600;
        color: #1e4d35;
        line-height: 1;
      }
      .stat-card .sub { font-size: 0.8rem; color: #6b7280; margin-top: 0.3rem; }

      .section { max-width: 900px; margin: 0 auto 1.5rem; }
      .section-title {
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #6b7280;
        margin-bottom: 0.75rem;
      }

      .bar-list { display: flex; flex-direction: column; gap: 0.5rem; }
      .bar-row {
        display: grid;
        grid-template-columns: 9rem 1fr 3rem;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.875rem;
      }
      .bar-row .key {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #374151;
        font-weight: 600;
      }
      .bar-track { background: #e9ede9; border-radius: 4px; height: 8px; overflow: hidden; }
      .bar-fill {
        height: 100%;
        background: #3a7d55;
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .bar-row .count { text-align: right; color: #6b7280; font-size: 0.82rem; }

      .two-col {
        max-width: 900px;
        margin: 0 auto 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

      .event-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
      .event-table th {
        text-align: left;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #9ca3af;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e4e4df;
      }
      .event-table td {
        padding: 0.45rem 0;
        border-bottom: 1px solid #f3f3f0;
        color: #374151;
      }
      .event-table td:last-child { text-align: right; color: #6b7280; }

      .daily-chart {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        height: 80px;
      }
      .day-bar-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        height: 100%;
        justify-content: flex-end;
      }
      .day-bar {
        width: 100%;
        background: #3a7d55;
        border-radius: 3px 3px 0 0;
        min-height: 2px;
      }
      .day-label { font-size: 0.65rem; color: #9ca3af; white-space: nowrap; }

      .status { color: #6b7280; font-size: 0.9rem; text-align: center; padding: 3rem 0; }
    </style>
  </head>
  <body>

    <!-- Login screen -->
    <div class="login-wrap" id="login-screen">
      <div class="login-card">
        <h1>GroundWork Analytics</h1>
        <p>Enter the analytics password to continue.</p>
        <form id="login-form" onsubmit="handleLogin(); return false;">
          <input
            type="password"
            class="login-input"
            id="password-input"
            placeholder="Password"
            autocomplete="current-password"
          />
          <button type="submit" class="login-btn" id="login-btn">View Analytics</button>
        </form>
        <p class="login-error" id="login-error" hidden>Incorrect password. Try again.</p>
      </div>
    </div>

    <!-- Dashboard (hidden until authenticated) -->
    <div id="dashboard" hidden>
      <div class="page-header">
        <h1>GroundWork — Usage Analytics</h1>
        <a href="/">← Back to app</a>
        <div class="header-actions">
          <button class="btn-sm btn-ghost" id="logout-btn">Log out</button>
          <button class="btn-sm btn-primary" id="refresh-btn">Refresh</button>
        </div>
      </div>
      <div id="content"><p class="status">Loading…</p></div>
    </div>

    <script>
      const SESSION_KEY = "analytics_token";

      function getToken() {
        return sessionStorage.getItem(SESSION_KEY) || "";
      }

      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      async function load() {
        const token = getToken();
        const content = document.getElementById("content");
        content.innerHTML = '<p class="status">Loading…</p>';
        try {
          const res = await fetch(`/api/analytics/summary?token=${encodeURIComponent(token)}`);
          if (res.status === 401) {
            sessionStorage.removeItem(SESSION_KEY);
            showLogin("Incorrect password. Try again.");
            return;
          }
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const d = await res.json();
          render(d);
        } catch (e) {
          content.innerHTML = `<p class="status" style="color:#dc2626">Error: ${esc(e.message)}</p>`;
        }
      }

      function showLogin(errorMsg) {
        document.getElementById("login-screen").hidden = false;
        document.getElementById("dashboard").hidden = true;
        const err = document.getElementById("login-error");
        if (errorMsg) {
          err.textContent = errorMsg;
          err.hidden = false;
        } else {
          err.hidden = true;
        }
        document.getElementById("password-input").value = "";
        document.getElementById("password-input").focus();
      }

      function showDashboard() {
        document.getElementById("login-screen").hidden = true;
        document.getElementById("dashboard").hidden = false;
        load();
      }

      async function handleLogin() {
        const pw = document.getElementById("password-input").value;
        if (!pw) return;
        const btn = document.getElementById("login-btn");
        btn.textContent = "Checking…";
        btn.disabled = true;
        try {
          const res = await fetch(`/api/analytics/summary?token=${encodeURIComponent(pw)}`);
          if (res.status === 401) {
            document.getElementById("login-error").hidden = false;
            document.getElementById("login-error").textContent = "Incorrect password. Try again.";
          } else if (res.ok) {
            sessionStorage.setItem(SESSION_KEY, pw);
            showDashboard();
          } else {
            document.getElementById("login-error").hidden = false;
            document.getElementById("login-error").textContent = `Error: HTTP ${res.status}`;
          }
        } catch (e) {
          document.getElementById("login-error").hidden = false;
          document.getElementById("login-error").textContent = e.message;
        } finally {
          btn.textContent = "View Analytics";
          btn.disabled = false;
        }
      }

      document.getElementById("refresh-btn").addEventListener("click", load);
      document.getElementById("logout-btn").addEventListener("click", () => {
        sessionStorage.removeItem(SESSION_KEY);
        showLogin();
      });

      function barList(obj, maxItems) {
        const entries = Object.entries(obj).slice(0, maxItems || 10);
        if (!entries.length) return "<p style='color:#9ca3af;font-size:.85rem'>No data yet</p>";
        const max = Math.max(...entries.map(([, v]) => v), 1);
        return `<div class="bar-list">${entries.map(([k, v]) => `
          <div class="bar-row">
            <span class="key" title="${esc(k)}">${esc(k)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v / max * 100)}%"></div></div>
            <span class="count">${v}</span>
          </div>`).join("")}</div>`;
      }

      function dailyChart(daily) {
        const entries = Object.entries(daily);
        if (!entries.length) return "<p style='color:#9ca3af;font-size:.85rem'>No data yet</p>";
        const max = Math.max(...entries.map(([, v]) => v), 1);
        return `<div class="daily-chart">${entries.map(([day, count]) => {
          const pct = Math.max(Math.round(count / max * 100), 2);
          return `<div class="day-bar-wrap">
            <div class="day-bar" style="height:${pct}%" title="${day}: ${count}"></div>
            <span class="day-label">${day.slice(5)}</span>
          </div>`;
        }).join("")}</div>`;
      }

      function render(d) {
        const completionColor = d.completion_rate_pct >= 50 ? "#1e4d35"
          : d.completion_rate_pct >= 25 ? "#b45309" : "#dc2626";
        document.getElementById("content").innerHTML = `
          <div class="grid">
            <div class="card stat-card">
              <div class="label">Total Events</div>
              <div class="value">${d.total_events.toLocaleString()}</div>
            </div>
            <div class="card stat-card">
              <div class="label">Stress Tests Run</div>
              <div class="value">${d.stress_tests_submitted.toLocaleString()}</div>
            </div>
            <div class="card stat-card">
              <div class="label">Reports Generated</div>
              <div class="value">${d.stress_tests_completed.toLocaleString()}</div>
            </div>
            <div class="card stat-card">
              <div class="label">Completion Rate</div>
              <div class="value" style="color:${completionColor}">${d.completion_rate_pct}%</div>
              <div class="sub">tests → reports</div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Events — last 14 days</div>
            <div class="card">${dailyChart(d.daily_events_last_14d)}</div>
          </div>

          <div class="two-col">
            <div class="section">
              <div class="section-title">Top Aspirations Selected</div>
              <div class="card">${barList(d.top_aspirations_selected)}</div>
            </div>
            <div class="section">
              <div class="section-title">Top Aspirations Completed</div>
              <div class="card">${barList(d.top_aspirations_completed)}</div>
            </div>
          </div>

          <div class="two-col">
            <div class="section">
              <div class="section-title">All Events</div>
              <div class="card">
                <table class="event-table">
                  <thead><tr><th>Event</th><th>Count</th></tr></thead>
                  <tbody>${Object.entries(d.by_event).map(([k, v]) =>
                    `<tr><td>${esc(k)}</td><td>${v.toLocaleString()}</td></tr>`
                  ).join("") || '<tr><td colspan="2" style="color:#9ca3af">No events yet</td></tr>'}</tbody>
                </table>
              </div>
            </div>
            <div class="section">
              <div class="section-title">Confidence Distribution</div>
              <div class="card">${barList(d.confidence_distribution)}</div>
            </div>
          </div>
        `;
      }

      // On load — if token is cached in sessionStorage, go straight to dashboard
      if (getToken()) {
        showDashboard();
      } else {
        showLogin();
      }
    </script>
  </body>
</html>
